<!DOCTYPE html>
{{- $mode := partialCached "func/getMode" . }}
<html lang="{{ .Lang }}" {{ if $mode }} data-mode="{{ $mode }}"{{ end }}>
  {{ partial "head" . }}
  <body>
    {{ partialCached "nav" . }}
    <div class="layout-with-sidebar">
      {{ partial "sidebar" . }}
      <main>
        {{ block "main" . }}{{ end }}
      </main>
    </div>
    {{ partialCached "footer" . }}
    {{ partialCached "sprites" . }}
  </body>
</html>
